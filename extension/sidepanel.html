<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeOS Side Panel</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="sp-shell">
    <header class="sp-header">
      <div class="sp-title">
        <div class="sp-icon">🌿</div>
        <div>
          <div class="sp-name">LifeOS</div>
          <div class="sp-sub">Side Panel</div>
        </div>
      </div>
      <div class="sp-actions">
        <button class="sp-btn" id="openTabBtn" title="Mở LifeOS trong tab mới">↗</button>
        <button class="sp-btn" id="reloadBtn" title="Tải lại">⟳</button>
      </div>
    </header>

    <div class="sp-body">
      <div class="sp-loading" id="loading">
        <div class="sp-spinner"></div>
        <div class="sp-loading-text">Đang tải LifeOS...</div>
      </div>
      <iframe 
        id="lifeosSideFrame"
        allow="camera; microphone; geolocation; payment; encrypted-media"
        sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation"
      ></iframe>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
