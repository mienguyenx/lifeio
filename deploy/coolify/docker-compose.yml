# LifeOS production stack for Coolify.
#
# This compose pulls the prebuilt images published to GHCR by the
# "Build & Push Images" GitHub Action, plus a PostgreSQL database.
# In Coolify: create a "Docker Compose" resource pointing at this file
# and set the environment variables from .env.example.
#
# Set IMAGE_NAMESPACE to your repo (e.g. ghcr.io/mienguyenx/lifeio) and
# IMAGE_TAG to the tag you want to deploy (default: latest).

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lifeos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-lifeos}
    volumes:
      - lifeos-db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-lifeos} -d ${POSTGRES_DB:-lifeos}']
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ${IMAGE_NAMESPACE:-ghcr.io/mienguyenx/lifeio}/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    # Run pending migrations, then start the API.
    command: ['npm', 'run', 'start:prod']
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:-lifeos}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-lifeos}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-30}
      AI_GATEWAY_URL: ${AI_GATEWAY_URL:-https://generativelanguage.googleapis.com/v1beta/openai/chat/completions}
      AI_MODEL: ${AI_MODEL:-gemini-2.5-flash}
      AI_GATEWAY_API_KEY: ${AI_GATEWAY_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LOVABLE_API_KEY: ${LOVABLE_API_KEY:-}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-LifeOS}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    expose:
      - '4000'
    # Coolify maps the public domain to this port via its proxy.
    ports:
      - '${BACKEND_PORT:-4000}:4000'

  frontend:
    image: ${IMAGE_NAMESPACE:-ghcr.io/mienguyenx/lifeio}/frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '${FRONTEND_PORT:-8080}:80'

volumes:
  lifeos-db:
