events {
    worker_connections 1024;
}

http {
    # Increase buffer sizes for large requests
    client_max_body_size 10M;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    upstream supabase_kong {
        server supabase_kong_Supabase:8000;
    }

    server {
        listen 80;
        server_name _;

        # Proxy all requests to Supabase Kong
        # Prefix /supabase đã được Traefik strip, nên chỉ cần forward trực tiếp
        location / {
            proxy_pass http://supabase_kong;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            
            # Pass through important headers from client to Supabase
            proxy_set_header apikey $http_apikey;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header x-client-info $http_x_client_info;
            proxy_set_header accept-profile $http_accept_profile;
            proxy_set_header content-profile $http_content_profile;
            proxy_set_header prefer $http_prefer;
            proxy_set_header x-supabase-api-version $http_x_supabase_api_version;
            proxy_set_header range $http_range;
            
            # WebSocket support (for realtime)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}

