events {
    worker_connections 1024;
}

http {
    # Increase buffer sizes for large requests
    client_max_body_size 10M;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    upstream supabase {
        server supabase_kong_Supabase:8000;
    }

    server {
        listen 80;
        server_name _;

        # Handle preflight OPTIONS requests
        location / {
            # OPTIONS preflight - return immediately with CORS headers
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' 'https://life.hoanong.com' always;
                add_header 'Access-Control-Allow-Methods' 'POST, GET, OPTIONS, PUT, DELETE, PATCH, HEAD' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, apikey, x-client-info, accept-profile, content-profile, prefer, x-supabase-api-version, range' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' '86400' always;
                add_header 'Access-Control-Expose-Headers' 'Content-Range, Range' always;
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain' always;
                return 204;
            }

            # Proxy to Supabase
            proxy_pass http://supabase;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            
            # Pass through important headers from client to Supabase
            proxy_set_header apikey $http_apikey;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header x-client-info $http_x_client_info;
            proxy_set_header accept-profile $http_accept_profile;
            proxy_set_header content-profile $http_content_profile;
            proxy_set_header prefer $http_prefer;
            proxy_set_header x-supabase-api-version $http_x_supabase_api_version;
            proxy_set_header range $http_range;
            
            # Hide CORS headers from upstream to avoid duplicates
            proxy_hide_header 'Access-Control-Allow-Origin';
            proxy_hide_header 'Access-Control-Allow-Methods';
            proxy_hide_header 'Access-Control-Allow-Headers';
            proxy_hide_header 'Access-Control-Allow-Credentials';
            proxy_hide_header 'Access-Control-Max-Age';
            proxy_hide_header 'Access-Control-Expose-Headers';
            
            # Add CORS headers to ALL responses (including errors)
            # Using 'always' ensures headers are added even on error responses
            add_header 'Access-Control-Allow-Origin' 'https://life.hoanong.com' always;
            add_header 'Access-Control-Allow-Methods' 'POST, GET, OPTIONS, PUT, DELETE, PATCH, HEAD' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, apikey, x-client-info, accept-profile, prefer, x-supabase-api-version, range' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' '86400' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Range, Range' always;
        }
    }
}
